name: "Terragrunt Deploy"

on:
  pull_request:
    types:
      - closed
    paths:
      - 'infrastructure-live/**'
      - 'infrastructure-modules/**'
      - '.github/workflows/terragrunt-deploy.yaml'

permissions:
  id-token: write # Used for OIDC security auth
  contents: read

jobs:
  terragrunt-deploy-resources:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure-live
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} 
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      # tflint is used to check code specifications
      - name: Setup Terragrunt
        uses: terraform-linters/setup-tflint@v4 
       
      - name: Install Terragrunt
        run: |
          TG_VERSION=$(curl -s "https://api.github.com/repos/gruntwork-io/terragrunt/releases/latest" | grep -Po '"tag_name": "\K.*?(?=")')
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          sudo chmod +x /usr/local/bin/terragrunt

      - name: Show Terragrunt Version
        run: terragrunt --version

      - name: Debug Directory Structure
        run: |
          echo "the current directory is: "
          pwd
          echo "the files in directory are: "
          ls -R
      
      
      - name: Terragrunt Deploy Resources
        run: |
          ROOT_DIR="$GITHUB_WORKSPACE/infrastructure-live"
          
          # firstly deploy VPC
          VPCS=("dev/vpc" "prod/vpc" "stage/vpc" "test/vpc")
          for vpc in "${VPCS[@]}"; do
            TARGET_DIR="$ROOT_DIR/$vpc"
            if [ -d "$TARGET_DIR" ]; then
              echo "--- Deploying VPC: $vpc ---"
              cd "$TARGET_DIR"
              rm -rf .terragrunt-cache
              terragrunt init -reconfigure -no-color
              terragrunt apply -auto-approve -no-color
              cd "$ROOT_DIR"
            else
              echo "WARNING: Directory $TARGET_DIR does not exist, skipping..."
            fi
          done

          # secondly deploy EC2
          EC2_MODULES=("dev/ec2" "prod/ec2")
          echo "--- Deploying EC2 Instances ---"
          for module in "${EC2_MODULES[@]}"; do
            TARGET_DIR="$ROOT_DIR/$module"
            if [ -d "$TARGET_DIR" ]; then
              echo "--- Processing: $module ---"
              cd "$TARGET_DIR"
              rm -rf .terragrunt-cache
              terragrunt init -reconfigure -no-color
              terragrunt apply -auto-approve -no-color
              cd "$ROOT_DIR"
            else
              echo "WARNING: Directory $TARGET_DIR does not exist, skipping..."
            fi
          done
        env:
          TG_NON_INTERACTIVE: "true"

     

