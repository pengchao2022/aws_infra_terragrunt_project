name: "Terragrunt Deploy"

on:
  pull_request:
    types:
      - closed
    paths:
      - 'infrastructure-live/**'
      - 'infrastructure-modules/**'
      - '.github/workflows/terragrunt-deploy.yaml'

permissions:
  id-token: write # Used for OIDC security auth
  contents: read

jobs:
  terragrunt-apply:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure-live
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} 
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      # tflint is used to check code specifications
      - name: Setup Terragrunt
        uses: terraform-linters/setup-tflint@v4 
       
      - name: Install Terragrunt
        run: |
          TG_VERSION=$(curl -s "https://api.github.com/repos/gruntwork-io/terragrunt/releases/latest" | grep -Po '"tag_name": "\K.*?(?=")')
          curl -L "https://github.com/gruntwork-io/terragrunt/releases/download/${TG_VERSION}/terragrunt_linux_amd64" -o terragrunt
          sudo mv terragrunt /usr/local/bin/terragrunt
          sudo chmod +x /usr/local/bin/terragrunt

      - name: Show Terragrunt Version
        run: terragrunt --version

      - name: Debug Directory Structure
        run: |
          echo "the current directory is: "
          pwd
          echo "the files in directory are: "
          ls -R
      
      - name: Terragrunt Init (Clean)
        run: |
          # 遍历所有目录
          MODULES=("dev/vpc" "dev/ec2" "prod/vpc" "stage/vpc" "test/vpc")
          for module in "${MODULES[@]}"; do
            echo "--- Initializing $module ---"
            # 1. 直接进入子目录
            cd $module
            # 2. 仅仅运行 terragrunt init
            # 不要加任何 --terragrunt-config 或 -- 参数，让 Terragrunt 自己去向上查找根配置
            terragrunt init -reconfigure
            # 3. 回到 infrastructure-live 目录
            cd ../..
          done
        env:
          TG_NON_INTERACTIVE: "true"

      - name: Terragrunt Plan and Apply
        run: |
          terragrunt run --all plan -- -out=tfplan
          terragrunt run --all apply -- -auto-approve tfplan
        env:
          TG_NON_INTERACTIVE: "true"

